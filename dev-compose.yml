services:
  database:
    container_name: database
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - dev.env
    image: postgres:18.0-alpine3.22
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d muse" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - muse-db:/var/lib/postgresql/data
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    restart: always

volumes:
  muse-db:
